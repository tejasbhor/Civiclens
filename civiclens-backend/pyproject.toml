[dependency-groups]
dev = [
    "pytest>=7.4.4",
    "pytest-asyncio>=0.23.3",
    "pytest-cov>=4.1.0",
    "faker>=22.4.0",
    "ruff>=0.15.0",
    "httpx>=0.26.0",
    "black>=23.12.0",
    "isort>=5.13.2",
]

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "I", "N", "UP", "S", "B", "A", "COM", "C4", "DTZ", "T20", "RET", "SIM", "ARG", "PTH", "ERA", "PL", "PLE", "PLR", "PLW", "RUF"]
ignore = ["D100", "D104", "D107", "ANN101", "ANN102", "PLR0913"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.setuptools]
packages = ["app"]

[tool.uv]
package = false

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu121", marker = "platform_machine == 'x86_64' or sys_platform == 'win32'" },
  { index = "pypi", marker = "platform_machine == 'aarch64'" }
]
