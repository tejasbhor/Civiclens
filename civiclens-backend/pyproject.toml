    "huggingface-hub==0.23.0",
    "accelerate==0.30.1",
    "scikit-learn==1.4.0",
    "scipy==1.16.3",
    "nltk==3.8.1",
    "sentencepiece==0.2.1",
    "sacremoses==0.1.1",
    "psutil==5.9.8",
