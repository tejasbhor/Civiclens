    "uvicorn[standard]==0.27.0",
    "starlette==0.35.1",
    "pydantic[email]==2.5.3",
    "pydantic-settings==2.1.0",
    "pydantic-core==2.14.6",
    "sqlalchemy==2.0.25",
    "asyncpg==0.29.0",
    "alembic==1.13.1",
    "psycopg2-binary==2.9.9",
    "geoalchemy2==0.14.3",
    "python-jose[cryptography]==3.3.0",
    "passlib[bcrypt]==1.7.4",
    "bcrypt==4.1.2",
    "cryptography==42.0.0",
    "argon2-cffi==25.1.0",
    "pyotp==2.9.0",
    "fastapi-mail==1.4.1",
    "aiosmtplib==2.0.2",
    "email-validator==2.2.0",
    "exponent-server-sdk==2.2.0",
    "minio==7.2.3",
    "pillow==10.2.0",
    "python-magic==0.4.27",
    "python-magic-bin==0.4.14; sys_platform == 'win32'",
    "aiofiles==23.2.1",
    "pandas==2.2.0",
    "numpy==1.26.3",
    "python-dateutil==2.8.2",
    "python-dotenv==1.0.0",
    "python-multipart==0.0.6",
    "redis==5.0.1",
    "hiredis==2.3.2",
    "click==8.3.1",
    "rich==14.2.0",
    "python-json-logger==2.0.7",
    "sentry-sdk==1.40.0",
    "httpx==0.26.0",
    "httpcore==1.0.9",
    "httptools==0.7.1",
    "anyio==4.12.1",
    "sniffio==1.3.1",
    "certifi==2026.2.25",
    "requests==2.32.5",
    "urllib3==1.26.18",
    "idna==3.11",
    "charset-normalizer==3.3.2",
    "async-timeout==5.0.1",
